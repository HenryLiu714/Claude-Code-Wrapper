services:
  api:
    build: ./backend
    ports:
      - "7878:7878"
    env_file:
      - ./backend/.env
    volumes:
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
    restart: unless-stopped
    networks:
      - global-link

networks:
  global-link:
    external: true
